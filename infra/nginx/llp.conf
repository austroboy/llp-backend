# =============================================================================
# Nginx config for the Django backend.
# Use this if you deploy on a single VPS rather than ECS+ALB.
# =============================================================================
# Critical bits for SSE/streaming:
#   proxy_buffering off
#   proxy_cache off
#   proxy_read_timeout 300s
#   X-Accel-Buffering: no   (also set by Django)

upstream llp_backend {
    server 127.0.0.1:8000 fail_timeout=0;
    keepalive 32;
}

server {
    listen 80;
    server_name api.laborlawpartner.com;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.laborlawpartner.com;

    ssl_certificate /etc/letsencrypt/live/api.laborlawpartner.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.laborlawpartner.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    client_max_body_size 15M;     # accommodate file uploads

    access_log /var/log/nginx/llp.access.log;
    error_log  /var/log/nginx/llp.error.log;

    # Static files (collected by Django via WhiteNoise; this is fallback)
    location /static/ {
        alias /app/staticfiles/;
        expires 7d;
        access_log off;
    }

    # Health checks — never log
    location = /api/health/ {
        access_log off;
        proxy_pass http://llp_backend;
        proxy_set_header Host $host;
    }

    # SSE / streaming chat — disable buffering!
    location ~* ^/api/v1/chat/conversations/[0-9]+/messages/ {
        proxy_pass http://llp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;

        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     300s;
        proxy_send_timeout     300s;
        chunked_transfer_encoding on;
        keepalive_timeout      300s;
    }

    # Everything else
    location / {
        proxy_pass http://llp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;
        proxy_read_timeout 90s;
    }
}
